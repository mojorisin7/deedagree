<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c"/>
      <stop offset="100%" style="stop-color:#0f2540"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="12" ry="12" fill="url(#bg)"/>

  <!-- Gold accent bar at top -->
  <rect x="10" y="8" width="44" height="3" rx="1.5" fill="#c9a84c"/>

  <!-- D letter -->
  <text
    x="14"
    y="46"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="30"
    font-weight="700"
    fill="#ffffff"
    letter-spacing="-1"
  >D</text>

  <!-- A letter, slightly offset and in gold -->
  <text
    x="34"
    y="46"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="30"
    font-weight="700"
    fill="#c9a84c"
  >A</text>

  <!-- Thin underline -->
  <rect x="10" y="51" width="44" height="2" rx="1" fill="#c9a84c" opacity="0.5"/>
</svg>
